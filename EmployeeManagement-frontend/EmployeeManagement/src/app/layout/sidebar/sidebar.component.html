<div class="d-flex">

  <!-- Sidebar -->

    <h4 class="text-center">EMS</h4>
    <hr>

    <ul class="nav nav-pills flex-column ">
      <li class="nav-item ">
        <a routerLink="/dashboard" class="nav-link text-white">Dashboard</a>
      </li>
      <li class="nav-item">
        <a routerLink="/employees" class="nav-link text-white ">Employees</a>
      </li>
      <li class="nav-item">
        <a routerLink="/add-employee" class="nav-link text-white ">Add Employee</a>
      </li>
      <li class="nav-item">
        <a routerLink="/" class="nav-link text-white ">Log out</a>
